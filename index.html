<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roaya Real Estate | Coming Soon</title>
    <link rel="stylesheet" href="style.css">

    <!-- استيراد خط أنيق واحترافي ليتطابق مع الصورة (Great Vibes) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>
    <!-- الترويسة العلوية -->
    <header class="header">
        <div class="coming-soon-text">Coming Soon</div>
        <img src="LOGO.png" alt="Roaya Real Estate Logo" class="logo">
    </header>

    <!-- حاوية الفيديو -->
    <main class="video-container">
        <!-- الخصائص autoplay muted loop ضرورية جداً لضمان عمل الفيديو تلقائياً في جميع المتصفحات -->
        <video autoplay muted loop playsinline id="main-video">
            <source src="video.mp4" type="video/mp4">
            متصفحك لا يدعم تشغيل الفيديو.
        </video>
    </main>
</body>

</html>
